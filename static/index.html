<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pharma Sales Co-pilot</title>
  <!--
    Claude-style typography: Styrene B (UI / headlines) + Tiempos Text (chat body).
    If you license those fonts, add Adobe Fonts or @font-face; otherwise Plus Jakarta Sans
    and Newsreader load below as close open substitutes.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* UI + headlines (Styrene B when provided; else Plus Jakarta Sans) */
      --font-ui: "Styrene B", "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      /* Conversation body (Tiempos Text when provided; else Newsreader) */
      --font-chat: "Tiempos Text", "Newsreader", "Georgia", "Times New Roman", serif;
      --bg: #f7f7f5;
      --sidebar-bg: #141414;
      --sidebar-w: 260px;
      --white: #ffffff;
      --border: #e5e5e3;
      --text: #1a1a1a;
      --text-muted: #8c8c8c;
      --accent: #4f46e5;
      --sidebar-orange: #ea580c;
      --sidebar-orange-hover: #f97316;
      --sidebar-muted: #9ca3af;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 20px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.06);
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 16px 14px 20px;
      gap: 0;
      flex-shrink: 0;
      z-index: 10;
      min-height: 0;
    }

    .sidebar-new-chat {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      background: var(--sidebar-orange);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.08s;
      flex-shrink: 0;
    }
    .sidebar-new-chat:hover { background: var(--sidebar-orange-hover); }
    .sidebar-new-chat:active { transform: scale(0.98); }

    .sidebar-hint {
      font-size: 11px;
      line-height: 1.45;
      color: var(--sidebar-muted);
      margin: 12px 4px 16px;
      flex-shrink: 0;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #6b7280;
      margin: 0 4px 8px;
      flex-shrink: 0;
    }

    .recent-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
    }
    .recent-scroll::-webkit-scrollbar { width: 4px; }
    .recent-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

    .recent-item {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .recent-item:hover {
      border-color: #4b5563;
      background: rgba(255,255,255,.04);
    }
    .recent-item.active {
      border-color: var(--sidebar-orange);
      background: rgba(234, 88, 12, 0.08);
    }
    .recent-title {
      display: block;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .recent-time {
      display: block;
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }

    /* ── Main ────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    /* ── Landing ─────────────────────────────────── */
    #landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 32px;
      gap: 28px;
    }

    .landing-title {
      font-family: var(--font-ui);
      font-size: 2rem;
      font-weight: 650;
      letter-spacing: -0.035em;
      color: var(--text);
      text-align: center;
    }

    .landing-sub {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
    }

    .pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 620px;
    }

    .pill {
      font-family: var(--font-ui);
      padding: 7px 15px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .pill:hover { border-color: #bbb; color: var(--text); box-shadow: var(--shadow-sm); }

    /* ── Chat screen ─────────────────────────────── */
    #chat-screen {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #d5d5d3; border-radius: 3px; }

    /* ── Message rows (Claude-style: user bubble hugs text; assistant uses full thread width) ── */
    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: min(768px, 100%);
      width: 100%;
      margin: 0 auto;
    }
    .msg-row.user {
      justify-content: flex-end;
    }
    .msg-row.ai {
      justify-content: flex-start;
    }

    .msg-bubble {
      font-family: var(--font-chat);
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.62;
      min-width: 0;
      overflow-wrap: break-word;
      word-wrap: break-word;
      word-break: break-word;
    }
    .msg-row.user .msg-bubble {
      flex: 0 1 auto;
      width: -moz-fit-content;
      width: fit-content;
      max-width: min(65ch, 100%);
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg-row.ai .msg-bubble {
      flex: 1 1 auto;
      max-width: 100%;
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      box-shadow: var(--shadow-sm);
    }

    /* Markdown in AI messages */
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .msg-bubble li { margin-bottom: 3px; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      margin: 12px 0 6px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    .msg-bubble h1 { font-size: 1.2em; }
    .msg-bubble h2 { font-size: 1.1em; }
    .msg-bubble h3 { font-size: 1.05em; }
    .msg-bubble table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
      margin: 10px 0;
      border-radius: 8px;
      overflow: hidden;
    }
    .msg-bubble th, .msg-bubble td {
      border: 1px solid #e8e8e6;
      padding: 7px 11px;
      text-align: left;
    }
    .msg-bubble th { background: #f5f5f3; font-weight: 600; }
    .msg-bubble tr:nth-child(even) td { background: #fbfbf9; }
    .msg-bubble code {
      background: #f0f0ee;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 12.5px;
      font-family: 'SF Mono', 'Fira Mono', monospace;
    }
    .msg-bubble pre {
      background: #1a1a1a;
      color: #e4e4e4;
      padding: 12px 14px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 12.5px;
    }
    .msg-bubble pre code { background: none; color: inherit; padding: 0; }
    .msg-bubble strong { font-weight: 650; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* Thinking dots */
    .thinking {
      font-family: var(--font-chat);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      color: var(--text-muted);
      font-size: 14px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .thinking-dots { display: flex; gap: 4px; }
    .thinking-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #bbb;
      animation: pulse 1.3s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ──────────────────────────────── */
    .input-wrap {
      padding: 12px 24px 20px;
      background: var(--bg);
    }

    .input-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
      max-width: min(768px, calc(100vw - var(--sidebar-w) - 48px));
      margin: 0 auto;
    }
    .input-box:focus-within {
      border-color: #c0c0be;
      box-shadow: 0 4px 24px rgba(0,0,0,.11);
    }

    .input-row {
      display: flex;
      align-items: center;
      padding: 8px 13px;
      gap: 10px;
      min-height: 48px;
    }

    textarea.msg-input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: var(--font-ui);
      resize: none;
      background: transparent;
      color: var(--text);
      line-height: 22px;
      max-height: 160px;
      min-height: 22px;
      padding: 6px 2px;
      margin: 0;
      vertical-align: middle;
      overflow-y: auto;
      overflow-wrap: break-word;
      word-wrap: break-word;
      word-break: break-word;
    }
    textarea.msg-input::placeholder { color: var(--text-muted); }

    .send-btn {
      font-family: var(--font-ui);
      width: 33px;
      height: 33px;
      border-radius: 9px;
      background: var(--text);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: #333; }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { background: #ccc; cursor: default; opacity: 0.6; }

    .input-row:not(.streaming) .stop-btn { display: none; }
    .input-row.streaming .stop-btn { display: inline-flex; }
    .input-row.streaming .send-btn { display: none; }

    .stop-btn {
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 33px;
      padding: 0 11px;
      border-radius: 9px;
      border: 1px solid #c9c9c7;
      background: var(--white);
      color: var(--text);
      font-size: 12.5px;
      font-weight: 600;
      font-family: var(--font-ui);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .stop-btn:hover { background: #f3f3f1; border-color: #b0b0ae; }
    .stop-btn .sq {
      width: 9px;
      height: 9px;
      background: #c43c3c;
      border-radius: 2px;
    }

    /* fade-in for messages */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row { animation: fadeUp 0.2s ease; }

    /* ── Product-instinct UI components ─────────────── */

    /* Instinct 1 — Interpretation banner */
    .interp-banner {
      font-family: var(--font-ui);
      font-size: 12px;
      color: #4338ca;
      background: #eef2ff;
      border-left: 3px solid #6366f1;
      border-radius: 0 6px 6px 0;
      padding: 6px 10px;
      margin-bottom: 10px;
      line-height: 1.45;
    }
    .interp-banner strong { font-weight: 600; }

    /* Instinct 1 — Alternative interpretation chips */
    .alt-section { margin-top: 12px; }
    .alt-label {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    .alt-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .alt-chip {
      font-family: var(--font-ui);
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #e0e0de;
      background: #fafaf8;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .alt-chip:hover {
      background: #eef2ff;
      border-color: #6366f1;
      color: #4338ca;
    }

    /* Instinct 2 — Collapsible SQL / data sources */
    .sql-toggle {
      margin-top: 12px;
      width: 100%;
      text-align: left;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 11px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font-ui);
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sql-toggle:hover { background: #f5f5f3; color: var(--text); }
    .sql-toggle .toggle-arrow {
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .sql-toggle.open .toggle-arrow { transform: rotate(90deg); }

    .sql-panel {
      display: none;
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fafaf8;
    }
    .sql-panel.open { display: block; }

    .sql-step {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0ee;
    }
    .sql-step:last-child { border-bottom: none; }

    .sql-step-label {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .sql-code {
      background: #1a1a1a;
      color: #e4e4e4;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 11.5px;
      font-family: 'SF Mono', 'Fira Mono', 'Menlo', monospace;
      overflow-x: auto;
      white-space: pre;
      line-height: 1.5;
    }

    /* Instinct 3 — Empty result diagnostic */
    .empty-diagnostic {
      margin-top: 12px;
      padding: 10px 13px;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 12.5px;
      color: #92400e;
    }
    .empty-diagnostic-title {
      font-weight: 600;
      margin-bottom: 3px;
    }
    .empty-diagnostic-desc { color: #a16207; margin-bottom: 6px; }
    .empty-diagnostic pre {
      background: #fef3c7;
      padding: 7px 9px;
      border-radius: 5px;
      font-size: 11px;
      color: #78350f;
      white-space: pre-wrap;
      font-family: 'SF Mono', 'Fira Mono', monospace;
      margin: 0;
    }

    /* Instinct 4 — Fatal error state */
    .error-bubble {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
    }

    /* Account / data warning banner */
    .warning-banner {
      font-family: var(--font-ui);
      font-size: 12px;
      color: #92400e;
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      border-radius: 0 6px 6px 0;
      padding: 6px 10px;
      margin-bottom: 10px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .warning-banner strong { font-weight: 600; }

    /* Streaming cursor blink */
    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text-muted);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────── -->
<nav class="sidebar" aria-label="Chat navigation">
  <button type="button" class="sidebar-new-chat" id="new-chat-btn">+ New Chat</button>
  <p class="sidebar-hint">Concise answers by default. Say &quot;detailed analysis&quot; for more.</p>
  <div class="sidebar-section-label">RECENT</div>
  <div class="recent-scroll" id="recent-list"></div>
</nav>

<!-- ── Main ──────────────────────────────────────── -->
<main class="main">

  <!-- Landing -->
  <div id="landing">
    <div>
      <p class="landing-title">What can I help with?</p>
      <p class="landing-sub">Pharma Sales Co-pilot &mdash; ask about reps, HCPs, territories, Rx, or accounts</p>
    </div>

    <div class="pills">
      <button class="pill" data-q="Who are the top 5 reps by total Rx this quarter?">Top reps by Rx</button>
      <button class="pill" data-q="Which HCPs have the highest NRx for our brand?">HCP Rx leaders</button>
      <button class="pill" data-q="Show territory performance breakdown">Territory performance</button>
      <button class="pill" data-q="Which reps have the most completed visits this month?">Visit activity</button>
      <button class="pill" data-q="What is the payor mix trend for our top accounts?">Payor mix trends</button>
    </div>

    <div class="input-box" style="width:100%;max-width:min(640px, calc(100vw - var(--sidebar-w) - 48px));">
      <div class="input-row">
        <textarea id="landing-input" class="msg-input" placeholder="Ask anything about your sales data…" rows="1"></textarea>
        <button type="button" class="send-btn" id="landing-send-btn" aria-label="Send">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen">
    <div class="chat-area" id="chat-area"></div>
    <div class="input-wrap">
      <div class="input-box">
        <div class="input-row" id="chat-input-row">
          <textarea id="chat-input" class="msg-input" placeholder="Ask a follow-up…" rows="1"></textarea>
          <button type="button" class="stop-btn" id="chat-stop-btn" aria-label="Stop generation" title="Stop">
            <span class="sq" aria-hidden="true"></span> Stop
          </button>
          <button type="button" class="send-btn" id="chat-send-btn" aria-label="Send">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
  // ── State ─────────────────────────────────────────
  const SESSION_KEY = 'synthio_chat_session';

  const state = {
    history: [],
    loading: false,
    abortCtrl: null,
    userStopped: false,
    requestId: 0,
  };

  /** UUID v4 without relying on crypto.randomUUID (unsupported in some browsers / HTTP). */
  function newSessionUUID() {
    var c = typeof crypto !== 'undefined' ? crypto : null;
    if (c && typeof c.randomUUID === 'function') {
      return c.randomUUID();
    }
    if (c && c.getRandomValues) {
      var buf = new Uint8Array(16);
      c.getRandomValues(buf);
      buf[6] = (buf[6] & 0x0f) | 0x40;
      buf[8] = (buf[8] & 0x3f) | 0x80;
      var hex = Array.prototype.map.call(buf, function (b) {
        return ('0' + b.toString(16)).slice(-2);
      }).join('');
      return (
        hex.slice(0, 8) +
        '-' +
        hex.slice(8, 12) +
        '-' +
        hex.slice(12, 16) +
        '-' +
        hex.slice(16, 20) +
        '-' +
        hex.slice(20)
      );
    }
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (ch) {
      var r = (Math.random() * 16) | 0;
      var v = ch === 'x' ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }

  function getSessionId() {
    let id = sessionStorage.getItem(SESSION_KEY);
    if (!id) {
      id = newSessionUUID();
      sessionStorage.setItem(SESSION_KEY, id);
    }
    return id;
  }

  function rotateSession() {
    const id = newSessionUUID();
    sessionStorage.setItem(SESSION_KEY, id);
    return id;
  }

  const RECENT_KEY = 'synthio_recent_chats_v1';
  const RECENT_MAX = 20;

  function loadRecent() {
    try {
      const raw = localStorage.getItem(RECENT_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) {
      return [];
    }
  }

  function saveRecent(list) {
    localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, RECENT_MAX)));
  }

  function upsertRecentAfterSend(userText) {
    const id = getSessionId();
    const list = loadRecent();
    const existing = list.find((x) => x.id === id);
    let title = existing
      ? existing.title
      : userText.replace(/\s+/g, ' ').trim().slice(0, 56);
    if (!title) title = 'New chat';
    const next = list.filter((x) => x.id !== id);
    next.unshift({ id, title, updatedAt: Date.now() });
    saveRecent(next);
    renderRecent();
  }

  function formatRelative(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 45) return 'just now';
    if (s < 3600) return `${Math.floor(s / 60)}m ago`;
    if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
    if (s < 604800) return `${Math.floor(s / 86400)}d ago`;
    return `${Math.floor(s / 604800)}w ago`;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function renderRecent() {
    const container = document.getElementById('recent-list');
    if (!container) return;
    container.innerHTML = '';
    const current = getSessionId();
    loadRecent().forEach((item) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'recent-item' + (item.id === current ? ' active' : '');
      btn.innerHTML =
        '<span class="recent-title">' +
        escapeHtml(item.title) +
        '</span><span class="recent-time">' +
        escapeHtml(formatRelative(item.updatedAt)) +
        '</span>';
      btn.addEventListener('click', () => switchToSession(item.id));
      container.appendChild(btn);
    });
  }

  function switchToSession(targetId) {
    if (targetId === getSessionId()) return;
    state.requestId += 1;
    if (state.abortCtrl) {
      state.userStopped = true;
      state.abortCtrl.abort();
    }
    sessionStorage.setItem(SESSION_KEY, targetId);
    state.history = [];
    chatAreaEl.innerHTML = '';
    chatInput.value = '';
    chatInput.style.height = 'auto';
    landingInput.value = '';
    landingInput.style.height = 'auto';
    setLoading(false);
    showLanding();
    renderRecent();
    hydrateHistoryFromServer();
  }

  // ── Elements ──────────────────────────────────────
  const landingEl      = document.getElementById('landing');
  const chatScreenEl   = document.getElementById('chat-screen');
  const chatAreaEl     = document.getElementById('chat-area');
  const landingInput   = document.getElementById('landing-input');
  const landingSendBtn = document.getElementById('landing-send-btn');
  const chatInput      = document.getElementById('chat-input');
  const chatSendBtn    = document.getElementById('chat-send-btn');
  const chatStopBtn    = document.getElementById('chat-stop-btn');
  const chatInputRow   = document.getElementById('chat-input-row');
  const newChatBtn     = document.getElementById('new-chat-btn');

  // ── Marked config ─────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  // ── Helpers ───────────────────────────────────────
  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
  }

  function setLoading(on) {
    state.loading = on;
    landingSendBtn.disabled = on;
    chatSendBtn.disabled    = on;
    chatInputRow.classList.toggle('streaming', on);
  }

  function stopGeneration() {
    if (!state.loading || !state.abortCtrl) return;
    state.userStopped = true;
    state.abortCtrl.abort();
  }

  function showLanding() {
    chatScreenEl.style.display = 'none';
    landingEl.style.display    = 'flex';
    landingInput.value = '';
    landingInput.style.height = 'auto';
    setTimeout(() => landingInput.focus(), 50);
  }

  function showChat() {
    landingEl.style.display    = 'none';
    chatScreenEl.style.display = 'flex';
    setTimeout(() => chatInput.focus(), 50);
  }

  // ── Append a plain message bubble (used for user messages + history replay) ──
  function appendMessage(role, text) {
    const row    = document.createElement('div');
    row.className = `msg-row ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'ai') {
      const raw = typeof text === 'string' ? text : String(text ?? '');
      try {
        bubble.innerHTML = marked.parse(raw);
      } catch (e) {
        bubble.textContent = raw;
      }
    } else {
      bubble.textContent = text;
    }

    row.appendChild(bubble);
    chatAreaEl.appendChild(row);
    scrollBottom();
    return row;
  }

  // ── Build structured content into an existing bubble element ────────────
  //
  //  Layout inside the AI bubble:
  //   0. [Warning banner]          — account disambiguation or data caveats
  //   1. [Interpretation banner]   — "I interpreted this as: …"
  //   2. [Main answer]             — markdown prose
  //   3. [Alternative chips]       — "Also explore: [By NRx growth] [By tier] …"
  //   4. [▶ View SQL & data]       — collapsible SQL panel
  //   5. [No data diagnostic]      — amber box with diagnostic detail
  //
  function _buildStructuredBubble(bubble, data, originalQuestion) {
    // ── 0. Warning banner (account disambiguation etc.) ───────────────────
    if (data.warning) {
      const warn = document.createElement('div');
      warn.className = 'warning-banner';
      warn.innerHTML = '<strong>Note:</strong> ' + escapeHtml(data.warning);
      bubble.appendChild(warn);
    }

    // ── 1. Interpretation banner ──────────────────────────────────────────
    const interp = (data.interpretation || '').trim();
    const origLower = (originalQuestion || '').trim().toLowerCase();
    const showBanner = interp && interp.toLowerCase() !== origLower;
    if (showBanner) {
      const banner = document.createElement('div');
      banner.className = 'interp-banner';
      banner.innerHTML = '<strong>I interpreted this as:</strong> ' + escapeHtml(interp);
      bubble.appendChild(banner);
    }

    // ── 2. Main answer ────────────────────────────────────────────────────
    const answerDiv = document.createElement('div');
    const answerText = typeof data.answer === 'string' ? data.answer : String(data.answer ?? '');
    try {
      answerDiv.innerHTML = marked.parse(answerText);
    } catch (e) {
      answerDiv.textContent = answerText;
    }
    bubble.appendChild(answerDiv);

    // ── 3. Alternative interpretation chips ───────────────────────────────
    const alts = Array.isArray(data.alternatives) ? data.alternatives : [];
    if (alts.length > 0) {
      const section = document.createElement('div');
      section.className = 'alt-section';
      const label = document.createElement('div');
      label.className = 'alt-label';
      label.textContent = 'Also explore:';
      section.appendChild(label);
      const chips = document.createElement('div');
      chips.className = 'alt-chips';
      alts.forEach(alt => {
        if (!alt || !alt.label) return;
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'alt-chip';
        chip.textContent = alt.label;
        chip.title = alt.query || alt.label;
        chip.addEventListener('click', () => sendMessage(alt.query || alt.label));
        chips.appendChild(chip);
      });
      section.appendChild(chips);
      bubble.appendChild(section);
    }

    // ── 4. Collapsible SQL & data sources panel ───────────────────────────
    const steps = Array.isArray(data.sql_steps)
      ? data.sql_steps.filter(s => s && s.sql)
      : [];
    if (steps.length > 0) {
      const toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'sql-toggle';
      toggle.innerHTML =
        '<svg class="toggle-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" ' +
        'stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
        '<polyline points="9 18 15 12 9 6"/></svg>' +
        '<span>View SQL &amp; data sources</span>';
      const panel = document.createElement('div');
      panel.className = 'sql-panel';
      steps.forEach((step, idx) => {
        const stepDiv = document.createElement('div');
        stepDiv.className = 'sql-step';
        const lbl = document.createElement('div');
        lbl.className = 'sql-step-label';
        lbl.textContent = steps.length > 1
          ? 'Step ' + (idx + 1) + (step.question ? ': ' + step.question : '')
          : 'SQL query';
        stepDiv.appendChild(lbl);
        const code = document.createElement('div');
        code.className = 'sql-code';
        code.textContent = step.sql;
        stepDiv.appendChild(code);
        panel.appendChild(stepDiv);
      });
      toggle.addEventListener('click', () => {
        const isOpen = panel.classList.toggle('open');
        toggle.classList.toggle('open', isOpen);
      });
      bubble.appendChild(toggle);
      bubble.appendChild(panel);
    }

    // ── 5. Empty-result diagnostic ────────────────────────────────────────
    if (data.empty_diagnostic) {
      const diagBox = document.createElement('div');
      diagBox.className = 'empty-diagnostic';
      const title = document.createElement('div');
      title.className = 'empty-diagnostic-title';
      title.textContent = 'No matching data found';
      diagBox.appendChild(title);
      const desc = document.createElement('div');
      desc.className = 'empty-diagnostic-desc';
      desc.textContent =
        'This could mean the filter is too narrow or the data doesn\'t cover this period.';
      diagBox.appendChild(desc);
      const pre = document.createElement('pre');
      pre.textContent = data.empty_diagnostic;
      diagBox.appendChild(pre);
      bubble.appendChild(diagBox);
    }
  }

  // ── Create a new AI row + bubble and render structured content into it ──
  function renderStructuredMessage(data, originalQuestion) {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    _buildStructuredBubble(bubble, data, originalQuestion);
    row.appendChild(bubble);
    chatAreaEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function scrollBottom() {
    chatAreaEl.scrollTop = chatAreaEl.scrollHeight;
  }

  // ── Thinking indicator ────────────────────────────
  function showThinking() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'thinking-row';

    const t = document.createElement('div');
    t.className = 'thinking';
    t.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div><span>Analyzing data…</span>';

    row.appendChild(t);
    chatAreaEl.appendChild(row);
    scrollBottom();
  }

  function hideThinking() {
    const el = document.getElementById('thinking-row');
    if (el) el.remove();
  }

  // ── Send message (SSE streaming) ─────────────────
  async function sendMessage(text) {
    text = text.trim();
    if (!text || state.loading) return;

    const rid = ++state.requestId;
    setLoading(true);
    showChat();
    appendMessage('user', text);
    chatInput.value = '';
    chatInput.style.height = 'auto';
    showThinking();

    const ctrl = new AbortController();
    state.userStopped = false;
    state.abortCtrl = ctrl;
    const timeoutMs = 12 * 60 * 1000;
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);

    // Streaming bubble — created on first token, replaced with full render on done
    let streamRow    = null;
    let streamBubble = null;
    let streamText   = '';    // accumulated plain text while streaming
    let cursor       = null;  // blinking cursor element
    let finalData    = null;

    function ensureStreamBubble() {
      if (streamRow) return;
      hideThinking();
      streamRow    = document.createElement('div');
      streamRow.className = 'msg-row ai';
      streamBubble = document.createElement('div');
      streamBubble.className = 'msg-bubble';
      cursor = document.createElement('span');
      cursor.className = 'stream-cursor';
      streamBubble.appendChild(cursor);
      streamRow.appendChild(streamBubble);
      chatAreaEl.appendChild(streamRow);
    }

    function appendToken(token) {
      ensureStreamBubble();
      streamText += token;
      // Render as plain text while streaming (safe + fast).
      // Remove cursor, set text, re-append cursor.
      if (cursor && cursor.parentNode === streamBubble) {
        streamBubble.removeChild(cursor);
      }
      streamBubble.textContent = streamText;
      streamBubble.appendChild(cursor);
      scrollBottom();
    }

    function finaliseStreamBubble(data) {
      // Replace plain-text stream with fully rendered structured response
      if (streamBubble) {
        streamBubble.innerHTML = '';
        _buildStructuredBubble(streamBubble, data, text);
      } else {
        // No tokens arrived (cache hit or REUSE_DATA) — render a fresh bubble
        renderStructuredMessage(data, text);
      }
      scrollBottom();
    }

    try {
      const res = await fetch('/chat/stream', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          message:    text,
          history:    state.history,
          session_id: getSessionId(),
        }),
        signal: ctrl.signal,
      });

      if (!res.ok) {
        let detail = res.statusText;
        try {
          const errBody = await res.json();
          if (errBody.detail) detail = typeof errBody.detail === 'string'
            ? errBody.detail
            : JSON.stringify(errBody.detail);
        } catch (_) { /* ignore */ }
        throw new Error(
          res.status >= 500
            ? "I couldn't compute this — the server encountered an error. Try rephrasing or asking about a specific time period."
            : `Request failed (${res.status}): ${detail}`
        );
      }

      // ── SSE reader loop ─────────────────────────────────────────────────
      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buf     = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        if (rid !== state.requestId) { reader.cancel(); break; }

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // keep any partial line for the next chunk

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let evt;
          try { evt = JSON.parse(line.slice(6)); } catch (_) { continue; }

          if (evt.type === 'status') {
            // Update the text inside the thinking indicator
            const thinkRow = document.getElementById('thinking-row');
            if (thinkRow) {
              const span = thinkRow.querySelector('span:last-child');
              if (span) span.textContent = evt.message;
            }

          } else if (evt.type === 'token') {
            appendToken(evt.text);

          } else if (evt.type === 'done') {
            finalData = evt;

          } else if (evt.type === 'error') {
            throw new Error(evt.message);
          }
        }
      }

      if (rid !== state.requestId) return;

      hideThinking();

      if (finalData) {
        finaliseStreamBubble(finalData);
        const answer = finalData.answer || '';
        state.history.push({ role: 'user',      message: text   });
        state.history.push({ role: 'assistant', message: answer });
        if (state.history.length > 20) state.history = state.history.slice(-20);
      } else if (streamText) {
        // Stream ended without a done event — show what we got
        if (streamBubble) {
          streamBubble.innerHTML = '';
          const d = document.createElement('div');
          try { d.innerHTML = marked.parse(streamText); } catch (_) { d.textContent = streamText; }
          streamBubble.appendChild(d);
        }
      }

      upsertRecentAfterSend(text);

    } catch (err) {
      if (rid !== state.requestId) return;
      hideThinking();

      if (err.name === 'AbortError' && state.userStopped) {
        // User clicked Stop — show partial content with a stopped indicator
        if (streamBubble && streamText) {
          if (cursor && cursor.parentNode === streamBubble) streamBubble.removeChild(cursor);
          const stopSpan = document.createElement('span');
          stopSpan.style.cssText = 'display:block;margin-top:8px;color:#aaa;font-size:12px;font-family:var(--font-ui)';
          stopSpan.textContent = '— stopped —';
          streamBubble.appendChild(stopSpan);
          // Push whatever streamed so far to history
          state.history.push({ role: 'user',      message: text       });
          state.history.push({ role: 'assistant', message: streamText });
        } else {
          hideThinking();
          appendMessage('ai', 'Generation stopped.');
        }
      } else {
        // Timeout or server error
        const msg = err.name === 'AbortError'
          ? `Request timed out after ${timeoutMs / 60000} minutes. The model may be slow — try again or restart Ollama.`
          : err.message;
        const errRow    = document.createElement('div');
        errRow.className = 'msg-row ai';
        const errBubble = document.createElement('div');
        errBubble.className = 'msg-bubble error-bubble';
        errBubble.textContent = msg;
        errRow.appendChild(errBubble);
        chatAreaEl.appendChild(errRow);
        scrollBottom();
      }
    } finally {
      clearTimeout(timer);
      if (state.abortCtrl === ctrl) state.abortCtrl = null;
      if (rid === state.requestId) setLoading(false);
    }

    if (state.requestId === rid) chatInput.focus();
  }

  // ── Event listeners ───────────────────────────────
  landingSendBtn.addEventListener('click', () => sendMessage(landingInput.value));
  chatSendBtn.addEventListener('click',    () => sendMessage(chatInput.value));
  chatStopBtn.addEventListener('click',    stopGeneration);

  [landingInput, chatInput].forEach(ta => {
    ta.addEventListener('input', () => autoResize(ta));
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(ta.value);
      }
    });
  });

  document.querySelectorAll('.pill').forEach(p =>
    p.addEventListener('click', () => sendMessage(p.dataset.q))
  );

  newChatBtn.addEventListener('click', () => {
    state.requestId += 1;
    if (state.abortCtrl) {
      state.userStopped = true;
      state.abortCtrl.abort();
    }
    rotateSession();
    state.history = [];
    chatAreaEl.innerHTML = '';
    chatInput.value = '';
    chatInput.style.height = 'auto';
    landingInput.value = '';
    landingInput.style.height = 'auto';
    setLoading(false);
    showLanding();
    renderRecent();
  });

  async function hydrateHistoryFromServer() {
    const sidAtStart = getSessionId();
    try {
      const res = await fetch('/history?session_id=' + encodeURIComponent(sidAtStart));
      if (getSessionId() !== sidAtStart) return;
      if (!res.ok) return;
      const data = await res.json();
      if (getSessionId() !== sidAtStart) return;
      const msgs = Array.isArray(data.messages) ? data.messages : [];
      state.history = msgs;
      if (msgs.length === 0) return;
      if (getSessionId() !== sidAtStart) return;
      showChat();
      chatAreaEl.innerHTML = '';
      for (const h of msgs) {
        appendMessage(h.role === 'assistant' ? 'ai' : 'user', h.message);
      }
    } catch (e) {
      /* Supabase off or network — keep empty history */
    } finally {
      if (getSessionId() === sidAtStart) renderRecent();
    }
  }

  renderRecent();
  hydrateHistoryFromServer();
</script>
</body>
</html>
